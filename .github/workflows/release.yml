name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Test and build distribution
        run: ./gradlew --no-daemon clean test installDist distTar distZip

      - name: Stage release artifacts
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p staging
          cp "build/distributions/bank-csv-to-qif-${version}.tar" "staging/bank-csv-to-qif-${version}.tar"
          cp "build/distributions/bank-csv-to-qif-${version}.zip" "staging/bank-csv-to-qif-${version}.zip"
          ( cd staging && sha256sum "bank-csv-to-qif-${version}.tar" "bank-csv-to-qif-${version}.zip" > SHA256SUMS.txt )
          ls -la staging/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            staging/bank-csv-to-qif-*.tar
            staging/bank-csv-to-qif-*.zip
            staging/SHA256SUMS.txt
